services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: humanly-staging-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-humanly_staging}
      POSTGRES_USER: ${POSTGRES_USER:-humanly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./packages/backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-humanly_user} -d ${POSTGRES_DB:-humanly_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humanly-staging-network

  redis:
    image: redis:7-alpine
    container_name: humanly-staging-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humanly-staging-network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: humanly-staging-backend
    env_file: ${ENV_FILE:-.env.staging}
    environment:
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads-staging:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - humanly-staging-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend-user:
    build:
      context: .
      dockerfile: docker/frontend-user.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: humanly-staging-frontend-user
    environment:
      PORT: 3002
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    networks:
      - humanly-staging-network

  nginx:
    image: nginx:alpine
    container_name: humanly-staging-nginx
    ports:
      - "${STAGING_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-user:
        condition: service_started
    restart: unless-stopped
    networks:
      - humanly-staging-network

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local

networks:
  humanly-staging-network:
    driver: bridge
