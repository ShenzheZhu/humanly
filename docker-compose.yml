
services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: humory-db
    environment:
      POSTGRES_DB: humory_dev
      POSTGRES_USER: humory_user
      POSTGRES_PASSWORD: humory_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humory_user -d humory_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humory-network

  redis:
    image: redis:7-alpine
    container_name: humory-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - humory-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  humory-network:
    driver: bridge