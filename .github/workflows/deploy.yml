name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
      BACKEND_IMAGE_NAME: humanly-backend
      FRONTEND_USER_IMAGE_NAME: humanly-frontend-user
      FRONTEND_IMAGE_NAME: humanly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_REPOSITORY"
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_DEPLOY_PATH"
          test -n "$NEXT_PUBLIC_API_URL"
          test -n "$NEXT_PUBLIC_WS_URL"

          if [ -z "$GCP_SERVICE_ACCOUNT_KEY" ] && { [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] || [ -z "$GCP_SERVICE_ACCOUNT_EMAIL" ]; }; then
            echo "Configure either GCP_SERVICE_ACCOUNT_KEY or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT_EMAIL." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity Federation
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud with service account key
        if: ${{ env.GCP_SERVICE_ACCOUNT_KEY != '' && (env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT_EMAIL == '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect changed deployment targets
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${GITHUB_SHA}"
          changed_file="$(mktemp)"
          force_all=false

          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            force_all=true
            git ls-files > "$changed_file"
          else
            git diff --name-only "$base" "$head" > "$changed_file"
          fi

          backend=false
          frontend_user=false
          frontend=false
          deploy=false

          if [[ "$force_all" == "true" ]]; then
            backend=true
            frontend_user=true
            frontend=true
            deploy=true
          else
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              case "$file" in
                package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json|docker-compose.prod.yml|.github/workflows/deploy.yml|scripts/deploy.sh|scripts/run-migrations.sh|docker/*.Dockerfile)
                  backend=true
                  frontend_user=true
                  frontend=true
                  deploy=true
                  ;;
                packages/shared/*|packages/shared/**)
                  backend=true
                  frontend_user=true
                  frontend=true
                  ;;
                packages/backend/*|packages/backend/**|packages/tracker/*|packages/tracker/**)
                  backend=true
                  ;;
                packages/editor/*|packages/editor/**|packages/frontend-user/*|packages/frontend-user/**)
                  frontend_user=true
                  ;;
                packages/frontend/*|packages/frontend/**)
                  frontend=true
                  ;;
                nginx/*|nginx/**|scripts/ensure-production-cert.sh|docs/PRODUCTION_DEPLOYMENT.md)
                  deploy=true
                  ;;
              esac
            done < "$changed_file"
          fi

          if [[ "$backend" == "true" || "$frontend_user" == "true" || "$frontend" == "true" ]]; then
            deploy=true
          fi

          echo "Changed files:"
          sed 's/^/  /' "$changed_file"
          echo "Build backend: ${backend}"
          echo "Build frontend-user: ${frontend_user}"
          echo "Build frontend: ${frontend}"
          echo "Run VM deploy: ${deploy}"

          {
            echo "backend=${backend}"
            echo "frontend_user=${frontend_user}"
            echo "frontend=${frontend}"
            echo "deploy=${deploy}"
          } >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: images
        run: |
          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}"
          backend_image="${registry}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          frontend_user_image="${registry}/${FRONTEND_USER_IMAGE_NAME}:${GITHUB_SHA}"
          frontend_image="${registry}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"

          {
            echo "backend_image=${backend_image}"
            echo "frontend_user_image=${frontend_user_image}"
            echo "frontend_image=${frontend_image}"
          } >> "$GITHUB_OUTPUT"

          echo "Backend image: ${backend_image}"
          echo "Frontend-user image: ${frontend_user_image}"
          echo "Frontend image: ${frontend_image}"

      - name: Build and push backend image
        if: ${{ steps.changes.outputs.backend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.backend_image }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend-user image
        if: ${{ steps.changes.outputs.frontend_user == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend-user.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_user_image }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ env.NEXT_PUBLIC_WS_URL }}
          cache-from: type=gha,scope=frontend-user
          cache-to: type=gha,mode=max,scope=frontend-user

      - name: Build and push frontend image
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_image }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=wss://admin.writehumanly.net
            NEXT_PUBLIC_TRACKER_URL=https://admin.writehumanly.net
            NEXT_PUBLIC_BASE_PATH=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Show skipped image builds
        run: |
          echo "backend build: ${{ steps.changes.outputs.backend }}"
          echo "frontend-user build: ${{ steps.changes.outputs.frontend_user }}"
          echo "frontend build: ${{ steps.changes.outputs.frontend }}"

      - name: Deploy images on VM
        if: ${{ steps.changes.outputs.deploy == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ steps.changes.outputs.backend == 'true' && steps.images.outputs.backend_image || '' }}
          FRONTEND_USER_IMAGE: ${{ steps.changes.outputs.frontend_user == 'true' && steps.images.outputs.frontend_user_image || '' }}
          FRONTEND_IMAGE: ${{ steps.changes.outputs.frontend == 'true' && steps.images.outputs.frontend_image || '' }}
          BACKEND_CHANGED: ${{ steps.changes.outputs.backend }}
          FRONTEND_USER_CHANGED: ${{ steps.changes.outputs.frontend_user }}
          FRONTEND_CHANGED: ${{ steps.changes.outputs.frontend }}
          VM_DEPLOY_PATH: ${{ env.VM_DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
          GH_REPO_TOKEN: ${{ github.token }}
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_USER_IMAGE,FRONTEND_IMAGE,BACKEND_CHANGED,FRONTEND_USER_CHANGED,FRONTEND_CHANGED,VM_DEPLOY_PATH,GITHUB_SHA,GH_REPO_TOKEN
          script: |
            set -euo pipefail

            echo "==> Pre-fetch VM disk cleanup"
            df -h "$VM_DEPLOY_PATH" || true
            docker system df || true
            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true
            df -h "$VM_DEPLOY_PATH" || true

            cd "$VM_DEPLOY_PATH"
            export GIT_TERMINAL_PROMPT=0
            git_auth_header="$(printf 'x-access-token:%s' "$GH_REPO_TOKEN" | base64 | tr -d '\n')"
            git_with_auth() {
              git -c "http.https://github.com/.extraheader=AUTHORIZATION: Basic ${git_auth_header}" "$@"
            }

            git gc --prune=now || true
            git_with_auth fetch --prune origin main
            git checkout main
            git_with_auth pull --ff-only origin main
            unset git_auth_header
            test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
            BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_USER_IMAGE="$FRONTEND_USER_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_CHANGED="$BACKEND_CHANGED" FRONTEND_USER_CHANGED="$FRONTEND_USER_CHANGED" FRONTEND_CHANGED="$FRONTEND_CHANGED" VM_DEPLOY_PATH="$VM_DEPLOY_PATH" bash scripts/deploy.sh
          script_stop: true
          command_timeout: 40m

      - name: Verify production health endpoints
        run: |
          curl -fsS https://writehumanly.net/health >/dev/null
          curl -fsS https://app.writehumanly.net/health >/dev/null
          curl -fsS https://admin.writehumanly.net/health >/dev/null
          curl -fsS https://api.writehumanly.net/health >/dev/null
          curl -fsS https://api.writehumanly.net/api/v1/health >/dev/null
