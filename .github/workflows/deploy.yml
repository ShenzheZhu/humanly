name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
      BACKEND_IMAGE_NAME: humanly-backend
      FRONTEND_USER_IMAGE_NAME: humanly-frontend-user
      FRONTEND_IMAGE_NAME: humanly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GCP_ARTIFACT_REPOSITORY"
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_DEPLOY_PATH"
          test -n "$NEXT_PUBLIC_API_URL"
          test -n "$NEXT_PUBLIC_WS_URL"

          if [ -z "$GCP_SERVICE_ACCOUNT_KEY" ] && { [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] || [ -z "$GCP_SERVICE_ACCOUNT_EMAIL" ]; }; then
            echo "Configure either GCP_SERVICE_ACCOUNT_KEY or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT_EMAIL." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity Federation
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud with service account key
        if: ${{ env.GCP_SERVICE_ACCOUNT_KEY != '' && (env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT_EMAIL == '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set image tags
        id: images
        run: |
          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}"
          backend_image="${registry}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}"
          frontend_user_image="${registry}/${FRONTEND_USER_IMAGE_NAME}:${GITHUB_SHA}"
          frontend_image="${registry}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}"

          {
            echo "backend_image=${backend_image}"
            echo "frontend_user_image=${frontend_user_image}"
            echo "frontend_image=${frontend_image}"
          } >> "$GITHUB_OUTPUT"

          echo "Backend image: ${backend_image}"
          echo "Frontend-user image: ${frontend_user_image}"
          echo "Frontend image: ${frontend_image}"

      - name: Build and push backend image
        run: |
          docker build \
            -f docker/backend.Dockerfile \
            -t "${{ steps.images.outputs.backend_image }}" \
            .
          docker push "${{ steps.images.outputs.backend_image }}"

      - name: Build and push frontend-user image
        run: |
          docker build \
            -f docker/frontend-user.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_WS_URL="$NEXT_PUBLIC_WS_URL" \
            -t "${{ steps.images.outputs.frontend_user_image }}" \
            .
          docker push "${{ steps.images.outputs.frontend_user_image }}"

      - name: Build and push frontend image
        run: |
          admin_ws_url="wss://admin.writehumanly.net"

          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="" \
            --build-arg NEXT_PUBLIC_WS_URL="$admin_ws_url" \
            --build-arg NEXT_PUBLIC_TRACKER_URL="https://admin.writehumanly.net" \
            --build-arg NEXT_PUBLIC_BASE_PATH="" \
            -t "${{ steps.images.outputs.frontend_image }}" \
            .
          docker push "${{ steps.images.outputs.frontend_image }}"

      - name: Deploy images on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
          FRONTEND_USER_IMAGE: ${{ steps.images.outputs.frontend_user_image }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          VM_DEPLOY_PATH: ${{ env.VM_DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_USER_IMAGE,FRONTEND_IMAGE,VM_DEPLOY_PATH,GITHUB_SHA
          script: |
            set -euo pipefail

            echo "==> Pre-fetch VM disk cleanup"
            df -h "$VM_DEPLOY_PATH" || true
            docker system df || true
            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true
            df -h "$VM_DEPLOY_PATH" || true

            cd "$VM_DEPLOY_PATH"
            git gc --prune=now || true
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main
            test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
            BACKEND_IMAGE="$BACKEND_IMAGE" FRONTEND_USER_IMAGE="$FRONTEND_USER_IMAGE" FRONTEND_IMAGE="$FRONTEND_IMAGE" VM_DEPLOY_PATH="$VM_DEPLOY_PATH" bash scripts/deploy.sh
          script_stop: true
          command_timeout: 40m

      - name: Verify production health endpoints
        run: |
          curl -fsS https://app.writehumanly.net/health >/dev/null
          curl -fsS https://admin.writehumanly.net/health >/dev/null
          curl -fsS https://api.writehumanly.net/health >/dev/null
          curl -fsS https://api.writehumanly.net/api/v1/health >/dev/null
